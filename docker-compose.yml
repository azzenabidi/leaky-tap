version: "3.9"

services:
  leaky-tap:
    build:
      context: .
      dockerfile: Dockerfile
    image: leaky-tap:latest
    container_name: leaky-tap
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
